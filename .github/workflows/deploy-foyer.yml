name: Deploy Foyer to GitHub Pages

on:
  push:
    branches: [main, cursor/foyer-space-d5ae]
    paths:
      - 'foyer/**'
      - '.github/workflows/deploy-foyer.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: foyer

      - uses: actions/deploy-pages@v4
        id: deployment
