name: Deploy Flat 4C Gallery to GitHub Pages

on:
  push:
    branches: [main, cursor/flat4c-2d-images-ce8b]
    paths:
      - 'flat4c/**'
      - '.github/workflows/deploy-flat4c-gallery.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-flat4c
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare gallery site
        run: |
          mkdir -p _site
          cp flat4c/gallery.html _site/index.html
          cp -r flat4c/images _site/images

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
