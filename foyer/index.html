<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOYER — Interior Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(20, 20, 20, 0.72); color: #e8e8e6;
      padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.5;
      backdrop-filter: blur(8px); max-width: 280px;
    }
    #hud h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; margin-bottom: 4px; }
    #hud p { color: #a0a0a0; font-size: 12px; }
    #capture {
      position: fixed; bottom: 20px; right: 20px; z-index: 10;
      background: #c9a24e; color: #1a1a1a; border: none;
      padding: 10px 18px; border-radius: 6px; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    #capture:hover { background: #e0bc6a; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <h1>FOYER</h1>
    <p>Drag to orbit · Scroll to zoom<br>
    Forest mural · Arched window · Chain-detail cabinet · Brass chandelier</p>
  </div>
  <button id="capture">Save View 01</button>
  <script type="module">
    import './js/scene.js';
    document.getElementById('capture').addEventListener('click', () => {
      const data = window.captureRender();
      const a = document.createElement('a');
      a.href = data;
      a.download = 'foyer_view01.png';
      a.click();
    });
  </script>
</body>
</html>
