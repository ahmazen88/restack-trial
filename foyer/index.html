<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>FOYER — Interior Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      height: 100%;
      height: -webkit-fill-available;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; touch-action: none; }
    #hud {
      position: fixed; top: max(16px, env(safe-area-inset-top)); left: max(16px, env(safe-area-inset-left)); z-index: 10;
      background: rgba(20, 20, 20, 0.78); color: #e8e8e6;
      padding: 12px 16px; border-radius: 10px; font-size: 13px; line-height: 1.5;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      max-width: min(300px, calc(100vw - 32px));
    }
    #hud h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.08em; margin-bottom: 4px; }
    #hud p { color: #a0a0a0; font-size: 12px; }
    #views {
      position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 50%;
      transform: translateX(-50%); z-index: 10;
      display: flex; gap: 8px;
    }
    #views button, #capture {
      background: rgba(201, 162, 78, 0.95); color: #1a1a1a; border: none;
      padding: 12px 16px; border-radius: 10px; font-size: 13px;
      font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }
    #views button { background: rgba(255, 255, 255, 0.14); color: #f0f0ee; }
    #capture {
      position: fixed; bottom: max(20px, env(safe-area-inset-bottom));
      right: max(16px, env(safe-area-inset-right)); z-index: 10;
    }
    #capture:active, #views button:active { opacity: 0.8; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <h1>FOYER</h1>
    <p id="hint">One finger to look · Pinch to zoom</p>
  </div>
  <div id="views">
    <button type="button" id="btn-view01">View 01</button>
    <button type="button" id="btn-top">Plan</button>
  </div>
  <button id="capture" type="button">Save</button>
  <script type="module">
    import './js/scene.js';
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) {
      document.getElementById('hint').textContent = 'Drag to look around · Pinch to zoom';
    }
    document.getElementById('capture').addEventListener('click', () => {
      const data = window.captureRender();
      const a = document.createElement('a');
      a.href = data;
      a.download = 'foyer_view01.png';
      a.click();
    });
    document.getElementById('btn-view01').addEventListener('click', () => window.setView01());
    document.getElementById('btn-top').addEventListener('click', () => window.setTopView());
  </script>
</body>
</html>
